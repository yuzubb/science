<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>リアル中性子星衝突シミュレータ</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #000; color: #fff; font-family: Arial, sans-serif; overflow: hidden; touch-action: none; }
        canvas { touch-action: none; }
        #canvas { display: block; width: 100%; height: 100vh; }
        .panel { 
            position: fixed; bottom: 20px; right: 20px; 
            background: rgba(0,0,0,0.9); border: 2px solid #00ff88; 
            padding: 20px; border-radius: 8px; font-size: 12px; 
            font-family: monospace; z-index: 100; 
            transition: transform 0.3s, opacity 0.3s;
            min-width: 280px;
        }
        .panel.hidden { 
            transform: translateX(calc(100% + 20px));
            opacity: 0;
            pointer-events: none;
        }
        .toggle-btn {
            position: fixed; bottom: 20px; right: 20px; z-index: 101;
            background: #00ff88; color: #000; border: none;
            width: 50px; height: 50px; border-radius: 50%;
            cursor: pointer; font-size: 24px; font-weight: bold;
            transition: all 0.3s;
            box-shadow: 0 0 20px rgba(0,255,136,0.5);
        }
        .toggle-btn:hover { box-shadow: 0 0 30px rgba(0,255,136,0.8); }
        .toggle-btn.hidden { display: none; }
        .btn { 
            background: #00ff88; color: #000; border: none; 
            padding: 10px 20px; margin: 5px 0; border-radius: 4px; 
            cursor: pointer; font-weight: bold; width: 100%;
            transition: all 0.2s;
        }
        .btn:hover { background: #00cc66; }
        .stat { margin: 10px 0; display: flex; justify-content: space-between; align-items: center; }
        .label { color: #00ff88; }
        .value { color: #ffff00; font-weight: bold; }
        .slider { width: 100%; height: 5px; background: #333; border-radius: 5px; -webkit-appearance: none; appearance: none; margin: 5px 0; }
        .slider::-webkit-slider-thumb { -webkit-appearance: none; appearance: none; width: 12px; height: 12px; background: #00ff88; cursor: pointer; border-radius: 50%; box-shadow: 0 0 5px #00ff88; }
        .slider::-moz-range-thumb { width: 12px; height: 12px; background: #00ff88; cursor: pointer; border-radius: 50%; border: none; box-shadow: 0 0 5px #00ff88; }
        .title { color: #00ff88; font-size: 14px; font-weight: bold; margin-bottom: 15px; text-shadow: 0 0 10px #00ff88; }
        .divider { height: 1px; background: #00ff88; margin: 10px 0; opacity: 0.5; }
        #whiteout {
            position: fixed; inset: 0; background: #fff;
            opacity: 0; pointer-events: none; z-index: 90;
        }
    </style>
</head>
<body>
    <div id="whiteout"></div>
    <button class="toggle-btn hidden" id="toggleBtn" onclick="togglePanel()">≡</button>
    
    <div class="panel" id="panel">
        <div class="title">中性子星衝突シミュレータ</div>
        <button class="btn" onclick="resetSim()">リセット</button>
        <button class="btn" onclick="togglePause()">一時停止/再開</button>
        <button class="btn" onclick="toggleAutoCam()">自動カメラ: <span id="autoCamLabel">ON</span></button>
        <button class="btn" onclick="togglePanel()">パネルを閉じる</button>
        
        <div class="divider"></div>
        
        <div class="stat">
            <span class="label">速度倍率:</span>
            <input type="range" min="0.5" max="15" value="4" class="slider" onchange="setSpeed(this.value)">
        </div>
        <div class="stat">
            <span class="label" id="speedLabel">4.0x</span>
        </div>
        
        <div class="divider"></div>
        
        <div class="stat">
            <span class="label">時間:</span>
            <span class="value" id="time">0.0s</span>
        </div>
        <div class="stat">
            <span class="label">距離:</span>
            <span class="value" id="dist">100.0</span>
        </div>
        <div class="stat">
            <span class="label">状態:</span>
            <span class="value" id="status">軌道中</span>
        </div>
        <div class="stat">
            <span class="label">ズーム:</span>
            <span class="value" id="zoom">1.0x</span>
        </div>
        <div class="stat">
            <span class="label">FPS:</span>
            <span class="value" id="fps">60</span>
        </div>
        
        <div class="divider"></div>
        
        <div style="font-size: 11px; color: #888; line-height: 1.6;">
            <strong style="color: #00ff88;">操作方法:</strong><br>
            ドラッグ: 回転<br>
            右ドラッグ / Shift+ドラッグ: 移動<br>
            ホイール: ズーム<br>
            スマホ: 1本指で回転・2本指でズーム/移動
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        let scene, camera, renderer;
        let star1, star2, blackHole;
        let paused = false;
        let time = 0;
        let speed = 4;
        let phase = 0;
        let frameCount = 0, lastTime = Date.now(), fps = 60;
        let cameraDistance = 120;
        let touchDistance = 0;
        let discMeshes = [];
        let sceneCenter = new THREE.Vector3(0, 0, 0);
        let bhParts = [];
        let bhTime = 0;
        let flash = null;
        let spriteTex = null;
        let lastFrameTime = performance.now();
        let starfieldMesh = null;
        let lensScene = null, lensCam = null, lensMat = null;
        let bhFormed = false;
        const BH_SCALE = 12.0;          // 事象の地平面の世界座標での半径
        const SHADOW_K = 2.598076;      // 影の見かけ半径 = √27/2 × Rs
        let occluder = null;
        let jetMats = [];
        let shakeAmp = 0;      // 接近に伴う定常的な震え
        let shakeImpulse = 0;  // 合体の衝撃
        let gwRings = [];      // 重力波の波紋
        let infall = null;     // 螺旋状に落ちるガス
        let infallData = null;
        let autoCam = true;
        let starDist = 999;
        // 手動カメラ：軌道角＋パン移動（目標値へ滑らかに追従）
        let camYaw = 0, camPitch = 0.5;
        let tgtYaw = 0, tgtPitch = 0.5, tgtDist = 120;
        let panOffset = new THREE.Vector3(0, 0, 0);
        let tgtPan = new THREE.Vector3(0, 0, 0);
        let dragMode = null;   // 'orbit' | 'pan'
        let lastPX = 0, lastPY = 0;
        let touchMode = null, lastTouchMid = null;
        const RIN_W  = 2.6 * BH_SCALE;   // 円盤内縁（世界座標）
        const ROUT_W = 14.0 * BH_SCALE;  // 円盤外縁（世界座標）

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x000510);
            scene.fog = new THREE.Fog(0x000510, 800, 3000);

            camera = new THREE.PerspectiveCamera(65, window.innerWidth / window.innerHeight, 0.1, 10000);
            camera.position.set(0, 40, 90);

            renderer = new THREE.WebGLRenderer({ antialias: true, precision: 'highp' });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 1.5));
            renderer.shadowMap.enabled = true;
            renderer.shadowMap.type = THREE.PCFShadowShadowMap;
            renderer.toneMapping = THREE.ACESFilmicToneMapping;
            renderer.toneMappingExposure = 1.4;
            document.body.appendChild(renderer.domElement);

            // ライティング
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.12);
            scene.add(ambientLight);

            const directional = new THREE.DirectionalLight(0xffffff, 0.7);
            directional.position.set(400, 400, 400);
            directional.castShadow = true;
            directional.shadow.mapSize.width = 4096;
            directional.shadow.mapSize.height = 4096;
            directional.shadow.camera.far = 3000;
            scene.add(directional);

            const pointLight1 = new THREE.PointLight(0xffbbff, 4, 2500);
            pointLight1.position.set(-500, 300, 500);
            scene.add(pointLight1);

            const pointLight2 = new THREE.PointLight(0xbbffff, 3.5, 2500);
            pointLight2.position.set(500, -300, -500);
            scene.add(pointLight2);

            const pointLight3 = new THREE.PointLight(0xffffaa, 2, 2000);
            pointLight3.position.set(0, 400, 0);
            scene.add(pointLight3);

            createStarfield();
            createNeutronStars();
            createInspiralRings();
            createLensScene();

            window.addEventListener('resize', onWindowResize);
            
            window.addEventListener('wheel', (e) => {
                e.preventDefault();
                goManual();
                tgtDist += e.deltaY > 0 ? tgtDist * 0.10 : -tgtDist * 0.10;
                tgtDist = Math.max(bhFormed ? 190 : 30, Math.min(900, tgtDist));
            }, { passive: false });

            // マウスドラッグ：左=軌道回転、右/Shift=パン移動
            renderer.domElement.addEventListener('pointerdown', (e) => {
                goManual();
                dragMode = (e.button === 2 || e.shiftKey) ? 'pan' : 'orbit';
                lastPX = e.clientX; lastPY = e.clientY;
            });
            window.addEventListener('pointerup', () => dragMode = null);
            window.addEventListener('pointermove', (e) => {
                if (!dragMode) return;
                const dx = e.clientX - lastPX, dy = e.clientY - lastPY;
                lastPX = e.clientX; lastPY = e.clientY;
                if (dragMode === 'orbit') {
                    tgtYaw -= dx * 0.005;
                    tgtPitch = Math.max(-1.4, Math.min(1.4, tgtPitch - dy * 0.005));
                } else {
                    const right = new THREE.Vector3().setFromMatrixColumn(camera.matrix, 0);
                    const up = new THREE.Vector3().setFromMatrixColumn(camera.matrix, 1);
                    const k = cameraDistance * 0.0016;
                    tgtPan.addScaledVector(right, -dx * k);
                    tgtPan.addScaledVector(up, dy * k);
                }
            });
            renderer.domElement.addEventListener('contextmenu', (e) => e.preventDefault());

            document.addEventListener('touchstart', (e) => {
                if (e.touches.length === 2) {
                    goManual();
                    const dx = e.touches[0].clientX - e.touches[1].clientX;
                    const dy = e.touches[0].clientY - e.touches[1].clientY;
                    touchDistance = Math.sqrt(dx * dx + dy * dy);
                    lastTouchMid = { x: (e.touches[0].clientX + e.touches[1].clientX)/2, y: (e.touches[0].clientY + e.touches[1].clientY)/2 };
                } else if (e.touches.length === 1) {
                    goManual();
                    dragMode = 'orbit';
                    lastPX = e.touches[0].clientX; lastPY = e.touches[0].clientY;
                }
            });

            document.addEventListener('touchmove', (e) => {
                if (e.touches.length === 2) {
                    const dx = e.touches[0].clientX - e.touches[1].clientX;
                    const dy = e.touches[0].clientY - e.touches[1].clientY;
                    const currentDistance = Math.sqrt(dx * dx + dy * dy);
                    const mid = { x: (e.touches[0].clientX + e.touches[1].clientX)/2, y: (e.touches[0].clientY + e.touches[1].clientY)/2 };

                    if (touchDistance > 0) {
                        // ピンチでズーム
                        const delta = currentDistance - touchDistance;
                        tgtDist -= delta * cameraDistance * 0.006;
                        tgtDist = Math.max(bhFormed ? 190 : 30, Math.min(900, tgtDist));
                        // 2本指スライドでパン
                        if (lastTouchMid) {
                            const mdx = mid.x - lastTouchMid.x, mdy = mid.y - lastTouchMid.y;
                            const right = new THREE.Vector3().setFromMatrixColumn(camera.matrix, 0);
                            const up = new THREE.Vector3().setFromMatrixColumn(camera.matrix, 1);
                            const k = cameraDistance * 0.0016;
                            tgtPan.addScaledVector(right, -mdx * k);
                            tgtPan.addScaledVector(up, mdy * k);
                        }
                    }
                    touchDistance = currentDistance;
                    lastTouchMid = mid;
                } else if (e.touches.length === 1 && dragMode === 'orbit') {
                    const dx = e.touches[0].clientX - lastPX, dy = e.touches[0].clientY - lastPY;
                    lastPX = e.touches[0].clientX; lastPY = e.touches[0].clientY;
                    tgtYaw -= dx * 0.005;
                    tgtPitch = Math.max(-1.4, Math.min(1.4, tgtPitch - dy * 0.005));
                }
            }, { passive: true });

            document.addEventListener('touchend', () => {
                touchDistance = 0; lastTouchMid = null; dragMode = null;
            });

            animate();
        }


        const LENS_FRAG = `
        precision highp float;
        uniform vec2  uRes;
        uniform vec3  uCamPos, uFwd, uRight, uUp;
        uniform float uTanHalf, uTime, uForm, uEsc;

        const float RIN  = 2.6;
        const float ROUT = 14.0;

        float hash21(vec2 p){
            p = fract(p * vec2(123.34, 456.21));
            p += dot(p, p + 45.32);
            return fract(p.x * p.y);
        }
        float noise(vec2 p){
            vec2 i = floor(p), f = fract(p);
            f = f * f * (3.0 - 2.0 * f);
            float a = hash21(i);
            float b = hash21(i + vec2(1.0, 0.0));
            float c = hash21(i + vec2(0.0, 1.0));
            float d = hash21(i + vec2(1.0, 1.0));
            return mix(mix(a, b, f.x), mix(c, d, f.x), f.y);
        }
        float fbm(vec2 p){
            float s = 0.0, a = 0.5;
            for (int i = 0; i < 5; i++){ s += a * noise(p); p *= 2.03; a *= 0.5; }
            return s;
        }

        // 降着円盤の放射
        vec3 diskColor(vec3 hit, vec3 rd){
            float r = length(hit.xz);
            float t = clamp((r - RIN) / (ROUT - RIN), 0.0, 1.0);
            float ang = atan(hit.z, hit.x);

            // ケプラー差動回転（内側ほど速く流れる）
            float spin = uTime * 2.4 / pow(r, 1.5);
            // 渦状のスパイラル密度波
            float spiral = ang * 2.0 + log(r) * 4.0 - spin * 2.0;
            vec2 q = vec2(ang * 2.2 + spin * 3.2, r * 1.25);
            float turb = fbm(q * 2.0) * 0.62 + fbm(q * 6.5) * 0.30 + fbm(q * 15.0) * 0.14;
            // スパイラルアームの濃淡
            float arm = 0.5 + 0.5 * sin(spiral);
            turb *= 0.7 + 0.6 * arm;

            // 温度勾配：内縁は青白い高温、中間はオレンジ、外縁は暗赤
            vec3 white = vec3(1.00, 0.98, 0.95);
            vec3 blue  = vec3(0.75, 0.85, 1.00);
            vec3 mid   = vec3(1.00, 0.60, 0.20);
            vec3 cold  = vec3(0.45, 0.10, 0.03);
            vec3 c = mix(blue, white, smoothstep(0.0, 0.12, t));
            c = mix(c, mid, smoothstep(0.10, 0.42, t));
            c = mix(c, cold, smoothstep(0.42, 1.0, t));

            float inten = pow(1.0 - t, 1.7) * 2.6;
            inten *= 0.45 + 1.0 * turb;
            inten *= smoothstep(0.0, 0.05, t) * smoothstep(1.0, 0.72, t);

            // 相対論的ドップラービーミング D = 1/(1 - β·n̂)、強度 ∝ D⁴
            vec3 vel = normalize(cross(vec3(0.0, 1.0, 0.0), hit));
            float beta = 0.62 / sqrt(max(r, 1.0) / RIN);
            float D = 1.0 / (1.0 - beta * dot(vel, -rd));
            D = clamp(D, 0.12, 5.5);
            inten *= pow(D, 3.6);

            // 青方偏移／赤方偏移
            c = mix(c, vec3(0.75, 0.88, 1.00), clamp((D - 1.0) * 0.35, 0.0, 0.5));
            c = mix(c, vec3(0.80, 0.16, 0.04), clamp((1.0 - D) * 0.85, 0.0, 0.65));

            return c * inten;
        }

        // 相対論的ジェット（Y軸方向の双極。円錐状のプラズマをボリュームで）
        vec3 jetColor(vec3 pos){
            float ax = abs(pos.y);
            float rad = length(pos.xz);
            float coneR = 0.4 + ax * 0.13;
            if (ax < 1.0 || ax > 24.0 || rad > coneR) return vec3(0.0);

            float core = 1.0 - smoothstep(0.0, coneR, rad);
            float along = 1.0 - smoothstep(1.0, 24.0, ax);
            float ang = atan(pos.z, pos.x);
            float helix = 0.5 + 0.5 * sin(ang * 6.0 - ax * 1.2 + uTime * 8.0);
            float streak = pow(0.5 + 0.5 * sin(ax * 3.0 - uTime * 14.0), 2.0);
            float inten = core * along * (0.4 + 0.6 * helix) * (0.5 + 0.7 * streak);
            vec3 c = mix(vec3(0.75, 0.88, 1.0), vec3(0.6, 0.4, 1.0), smoothstep(0.0, 24.0, ax));
            return c * inten * 2.2;
        }

        // 背景の星（セル中心からの距離で丸く描く）
        vec3 starColor(vec3 d){
            vec2 uv = vec2(atan(d.z, d.x) * 0.1591 + 0.5, acos(clamp(d.y, -1.0, 1.0)) * 0.3183);
            vec3 c = vec3(0.0);

            for (int k = 0; k < 2; k++){
                float sc = (k == 0) ? 760.0 : 340.0;
                vec2 g  = uv * sc;
                vec2 id = floor(g);
                vec2 f  = fract(g) - 0.5;
                float h = hash21(id + float(k) * 13.7);
                if (h > 0.984){
                    vec2 off = vec2(hash21(id + 1.3), hash21(id + 7.1)) - 0.5;
                    float dd = length(f - off * 0.55);
                    float b  = (h - 0.984) / 0.016;
                    c += vec3(1.0) * smoothstep(0.075, 0.0, dd) * (0.5 + b * 1.1);
                }
            }
            c += vec3(0.05, 0.05, 0.11) * fbm(uv * 6.0);
            return c;
        }

        void main(){
            vec2 uv = (gl_FragCoord.xy - 0.5 * uRes) / uRes.y;
            vec3 rd = normalize(uFwd + (uRight * uv.x + uUp * uv.y) * 2.0 * uTanHalf);

            vec3 p = uCamPos;
            vec3 v = rd;
            vec3 hv = cross(p, v);
            float h2 = dot(hv, hv);

            float horizon = mix(0.03, 1.0, uForm);
            vec3 col = vec3(0.0);
            bool captured = false;

            // 測地線を積分して光の軌跡を曲げる
            for (int i = 0; i < 200; i++){
                float r2 = dot(p, p);
                float r = sqrt(r2);
                if (r < horizon) { captured = true; break; }
                if (r > uEsc && dot(v, p) > 0.0) break;

                float dt = 0.085 * max(1.0, r * 0.30);
                // 赤道面の近くでは細かく刻む（円盤の横断を取りこぼさない）
                dt *= mix(0.30, 1.0, smoothstep(0.0, 1.6, abs(p.y)));
                // ブラックホール近傍では曲がりが急なので更に細かく（アインシュタインリング）
                dt *= mix(0.35, 1.0, smoothstep(1.0, 7.0, r));
                vec3 acc = -1.5 * h2 * p / pow(r2, 2.5);
                vec3 pn = p + v * dt + 0.5 * acc * dt * dt;
                v += acc * dt;

                // 赤道面を横切ったら円盤を積算（何度も横切るので裏側が回り込む）
                if (p.y * pn.y < 0.0){
                    float tt = -p.y / (pn.y - p.y);
                    vec3 hit = mix(p, pn, tt);
                    float rr = length(hit.xz);
                    if (rr > RIN && rr < ROUT){
                        col += diskColor(hit, normalize(v)) * uForm;
                    }
                }
                p = pn;
            }

            if (!captured){
                vec3 outDir = normalize(v);

                // 曲がり角 → 重力レンズの増光率。キワを通る星ほど円弧に引き伸ばされる
                float bend = 1.0 - dot(outDir, rd);          // 0（直進）〜 2（反転）
                float magnify = 1.0 + pow(clamp(bend, 0.0, 2.0), 1.4) * 3.2;

                col += starColor(outDir) * magnify * (0.55 + 0.45 * (1.0 - uForm));

                // 臨界衝突径数の直上を掠める光 → 光子リングの細い光輪
                float photon = smoothstep(0.55, 0.95, bend) * smoothstep(1.90, 1.35, bend);
                col += vec3(1.0, 0.95, 0.85) * photon * 0.55 * uForm;
                // さらに内側の二次光子リング（何周も回った光）
                float photon2 = smoothstep(1.4, 1.75, bend) * smoothstep(2.0, 1.8, bend);
                col += vec3(1.0, 0.9, 0.75) * photon2 * 0.9 * uForm;
            }

            col = col / (1.0 + col);          // トーンマップ
            col = pow(col, vec3(0.85));       // ガンマ
            gl_FragColor = vec4(col, 1.0);
        }`;


        // ============ 重力波の波紋 ============
        function createGravWaveRings(pos) {
            for (let i = 0; i < 4; i++) {
                const geo = new THREE.RingGeometry(0.60, 1.0, 256, 1);
                const mat = new THREE.ShaderMaterial({
                    uniforms: {
                        uAge:     { value: 0 },
                        uOpacity: { value: 0 },
                        uSeed:    { value: Math.random() * 10.0 }
                    },
                    vertexShader: `
                        varying vec2 vP;
                        void main(){
                            vP = position.xy;
                            gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
                        }`,
                    fragmentShader: `
                        uniform float uAge;
                        uniform float uOpacity;
                        uniform float uSeed;
                        varying vec2 vP;
                        void main(){
                            float r = length(vP);
                            float t = clamp((r - 0.60) / 0.40, 0.0, 1.0);
                            float ang = atan(vP.y, vP.x);

                            // 同心円状に外へ走る時空の震え
                            float ripple = 0.5 + 0.5 * sin(t * 58.0 - uAge * 26.0 + sin(ang * 5.0 + uSeed) * 1.3);
                            ripple = pow(ripple, 2.4);
                            float ripple2 = 0.5 + 0.5 * sin(t * 22.0 - uAge * 11.0 - ang * 2.0);

                            float band = smoothstep(0.0, 0.18, t) * smoothstep(1.0, 0.55, t);
                            float a = uOpacity * band * (0.18 + 0.82 * ripple * (0.4 + 0.6 * ripple2));

                            vec3 c = mix(vec3(0.35, 0.62, 1.0), vec3(1.0), ripple * 0.75);
                            gl_FragColor = vec4(c, a);
                        }`,
                    transparent: true,
                    depthWrite: false,
                    side: THREE.DoubleSide,
                    blending: THREE.AdditiveBlending
                });
                const ring = new THREE.Mesh(geo, mat);
                ring.rotation.x = -Math.PI / 2;     // XZ平面に寝かせる
                ring.position.copy(pos);
                ring.scale.setScalar(20);
                scene.add(ring);
                gwRings.push({ mesh: ring, age: -i * 0.28, speed: 340 - i * 45 });
            }
        }

        function updateGravWaveRings(dt) {
            for (let i = gwRings.length - 1; i >= 0; i--) {
                const g = gwRings[i];
                g.age += dt;
                if (g.age < 0) continue;
                const sc = 20 + g.age * g.speed;
                g.mesh.scale.set(sc, sc, 1);
                g.mesh.material.uniforms.uAge.value = g.age;
                // 立ち上がってから減衰
                const op = Math.min(g.age * 5.0, 1.0) * Math.exp(-g.age * 0.85);
                g.mesh.material.uniforms.uOpacity.value = op * 0.75;
                if (op < 0.004) {
                    scene.remove(g.mesh);
                    gwRings.splice(i, 1);
                }
            }
        }

        // ============ 螺旋状に落ちるガス ============
        function createInfallGas(pos) {
            const N = 2600;
            const positions = new Float32Array(N * 3);
            const colors = new Float32Array(N * 3);
            const radius = new Float32Array(N);
            const angle = new Float32Array(N);
            const height = new Float32Array(N);

            for (let i = 0; i < N; i++) {
                radius[i] = ROUT_W * (0.9 + Math.random() * 0.8);
                angle[i] = Math.random() * Math.PI * 2;
                height[i] = (Math.random() - 0.5) * 22;   // 薄い円盤
            }

            const geo = new THREE.BufferGeometry();
            geo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            geo.setAttribute('color', new THREE.BufferAttribute(colors, 3));

            const mat = new THREE.PointsMaterial({
                size: 2.6,
                vertexColors: true,
                map: spriteTex,
                transparent: true,
                opacity: 0,
                sizeAttenuation: true,
                depthWrite: false,
                depthTest: true,
                blending: THREE.AdditiveBlending,
                toneMapped: false
            });

            infall = new THREE.Points(geo, mat);
            infall.renderOrder = 4;
            infall.position.copy(pos);
            scene.add(infall);
            infallData = { N, radius, angle, height };
            bhParts.push({ mesh: infall, delay: 0.9, dur: 1.8, opacity: 0.5 });
        }

        function updateInfallGas(dt) {
            if (!infall) return;
            const d = infallData;
            const pos = infall.geometry.attributes.position.array;
            const col = infall.geometry.attributes.color.array;
            const step = dt * speed;

            for (let i = 0; i < d.N; i++) {
                let r = d.radius[i];

                // ケプラー角速度 ω ∝ r^-3/2
                d.angle[i] += (2600 / Math.pow(r, 1.5)) * step;

                // 粘性による内向きのドリフト（内側ほど加速して落ちる）
                r -= step * (26 + 4200 / (r * r) * BH_SCALE);

                // 事象の地平面に落ちたら外縁で再生成
                if (r < RIN_W * 0.82) {
                    r = ROUT_W * (1.05 + Math.random() * 0.6);
                    d.angle[i] = Math.random() * Math.PI * 2;
                    d.height[i] = (Math.random() - 0.5) * 55;
                }
                d.radius[i] = r;

                // 内側へ行くほど円盤面に沈み込む
                const flat = Math.min(r / ROUT_W, 1.0);
                const y = d.height[i] * flat * flat;

                pos[i * 3]     = Math.cos(d.angle[i]) * r;
                pos[i * 3 + 1] = y;
                pos[i * 3 + 2] = Math.sin(d.angle[i]) * r;

                // 内縁ほど白熱
                const t = Math.min(Math.max((r - RIN_W) / (ROUT_W - RIN_W), 0), 1);
                col[i * 3]     = 1.0;
                col[i * 3 + 1] = 0.30 + 0.65 * (1 - t);
                col[i * 3 + 2] = 0.02 + 0.80 * Math.pow(1 - t, 3);
            }

            infall.geometry.attributes.position.needsUpdate = true;
            infall.geometry.attributes.color.needsUpdate = true;
        }

        // ============ 合体前の重力波（インスパイラル） ============
        let inspiralRings = [];
        function createInspiralRings() {
            for (let i = 0; i < 5; i++) {
                const geo = new THREE.RingGeometry(0.6, 1.0, 128, 1);
                const mat = new THREE.ShaderMaterial({
                    uniforms: { uAge: { value: 0 }, uOpacity: { value: 0 } },
                    vertexShader: `varying vec2 vP; void main(){ vP = position.xy; gl_Position = projectionMatrix * modelViewMatrix * vec4(position,1.0); }`,
                    fragmentShader: `
                        uniform float uAge, uOpacity; varying vec2 vP;
                        void main(){
                            float r = length(vP);
                            float t = clamp((r - 0.6) / 0.4, 0.0, 1.0);
                            float ang = atan(vP.y, vP.x);
                            float quad = 0.5 + 0.5 * cos(ang * 2.0 - uAge * 6.0 + t * 20.0);
                            float band = smoothstep(0.0, 0.2, t) * smoothstep(1.0, 0.6, t);
                            float a = uOpacity * band * (0.2 + 0.8 * quad);
                            vec3 c = mix(vec3(0.3,0.55,1.0), vec3(0.7,0.85,1.0), quad);
                            gl_FragColor = vec4(c, a);
                        }`,
                    transparent: true, depthWrite: false, side: THREE.DoubleSide, blending: THREE.AdditiveBlending
                });
                const ring = new THREE.Mesh(geo, mat);
                ring.rotation.x = -Math.PI / 2;
                ring.visible = false;
                scene.add(ring);
                inspiralRings.push({ mesh: ring, phase: i / 5 });
            }
        }

        function updateInspiralRings(dt) {
            if (blackHole) { inspiralRings.forEach(r => r.mesh.visible = false); return; }
            const dist = starDist;
            const intensity = dist < 90 ? Math.pow((90 - dist) / 90, 1.5) : 0;
            inspiralRings.forEach((r) => {
                r.phase += dt * speed * (0.15 + 0.5 * intensity);
                if (r.phase > 1) r.phase -= 1;
                const sc = 20 + r.phase * 260;
                r.mesh.position.copy(sceneCenter);
                r.mesh.scale.set(sc, sc, 1);
                r.mesh.material.uniforms.uAge.value = time * (1 + intensity);
                const fade = Math.sin(r.phase * Math.PI);
                r.mesh.material.uniforms.uOpacity.value = fade * intensity * 0.6;
                r.mesh.visible = intensity > 0.02;
            });
        }

        // 根元が最も眩しく、先端に向かって減衰、輪郭はソフト
        function makeJetMaterial(color, opacity) {
            return new THREE.ShaderMaterial({
                uniforms: {
                    uColor:   { value: new THREE.Color(color) },
                    uOpacity: { value: 0.0 },
                    uTime:    { value: 0.0 }
                },
                vertexShader: `
                    varying vec3 vN;
                    varying vec3 vV;
                    varying vec3 vAxis;
                    varying float vT;
                    varying vec2 vUv;
                    void main(){
                        vN = normalize(normalMatrix * normal);
                        vec4 mv = modelViewMatrix * vec4(position, 1.0);
                        vV = normalize(-mv.xyz);
                        // 円錐のローカル -Y = 頂点(BH側)から底面へ = プラズマの進行方向
                        vAxis = normalize((modelViewMatrix * vec4(0.0, -1.0, 0.0, 0.0)).xyz);
                        vT = uv.y;              // 1 = 円錐の頂点（ブラックホール側 = 根元）
                        vUv = uv;
                        gl_Position = projectionMatrix * mv;
                    }`,
                fragmentShader: `
                    uniform vec3 uColor;
                    uniform float uOpacity;
                    uniform float uTime;
                    varying vec3 vN;
                    varying vec3 vV;
                    varying vec3 vAxis;
                    varying float vT;
                    varying vec2 vUv;
                    void main(){
                        // 側面の輪郭でふわっと光らせる（ソフトエッジ）
                        float rim = 1.0 - abs(dot(normalize(vN), normalize(vV)));
                        rim = pow(clamp(rim, 0.0, 1.0), 1.5);

                        // 根元 → 先端の減衰
                        float grad = pow(clamp(vT, 0.0, 1.0), 2.3);

                        // u = 0 が根元、1 が先端。プラズマが外向きに走る
                        float u = 1.0 - vT;
                        float ang = vUv.x * 6.2831853;

                        // 高速で噴き出す光の塊
                        float streak = 0.5 + 0.5 * sin(u * 26.0 - uTime * 16.0 + sin(ang * 3.0) * 1.6);
                        streak = pow(streak, 3.0);

                        // 螺旋状のフィラメント（磁力線に巻きつくガス）
                        float fil = 0.5 + 0.5 * sin(ang * 7.0 + u * 12.0 - uTime * 4.5);
                        fil = pow(fil, 2.0);

                        // 根元付近で衝撃波のように脈打つ
                        float pulse = 0.75 + 0.25 * sin(uTime * 9.0 - u * 5.0);

                        float flow = 0.45 + 0.85 * streak * (0.4 + 0.6 * fil);

                        float a = uOpacity * grad * (0.20 + 0.80 * rim) * flow * pulse;
                        vec3 c = mix(uColor, vec3(1.0), clamp(grad * 0.65 + streak * 0.35, 0.0, 1.0));
                        c *= (0.5 + 1.6 * grad) * (0.6 + 0.9 * streak);

                        // 特殊相対論的ビーミング：手前に噴くジェットは眩しく、奥へ去るジェットは暗い
                        // D = 1 / (1 - β·cosθ)、強度 ∝ D^(2+α)
                        float mu = dot(normalize(vAxis), normalize(vV));
                        float jetD = 1.0 / (1.0 - 0.70 * mu);
                        jetD = clamp(jetD, 0.22, 3.4);
                        float beam = pow(jetD, 2.2);

                        c *= beam;
                        a *= clamp(beam * 0.75, 0.04, 2.2);

                        // 近づくジェットは青方偏移、遠ざかるジェットは赤方偏移
                        c = mix(c, c * vec3(0.80, 0.90, 1.15), clamp((jetD - 1.0) * 0.5, 0.0, 0.6));
                        c = mix(c, c * vec3(1.20, 0.55, 0.35), clamp((1.0 - jetD) * 1.1, 0.0, 0.6));

                        gl_FragColor = vec4(c, a);
                    }`,
                transparent: true,
                depthWrite: false,
                depthTest: true,
                side: THREE.DoubleSide,
                blending: THREE.AdditiveBlending
            });
        }

        function createLensScene() {
            lensScene = new THREE.Scene();
            lensCam = new THREE.OrthographicCamera(-1, 1, 1, -1, 0, 1);
            lensMat = new THREE.ShaderMaterial({
                uniforms: {
                    uRes:     { value: new THREE.Vector2(1, 1) },
                    uCamPos:  { value: new THREE.Vector3() },
                    uFwd:     { value: new THREE.Vector3() },
                    uRight:   { value: new THREE.Vector3() },
                    uUp:      { value: new THREE.Vector3() },
                    uTanHalf: { value: Math.tan(65 * Math.PI / 360) },
                    uTime:    { value: 0 },
                    uForm:    { value: 0 },
                    uEsc:     { value: 70 }
                },
                vertexShader: 'void main(){ gl_Position = vec4(position, 1.0); }',
                fragmentShader: LENS_FRAG,
                depthWrite: false,
                depthTest: false
            });
            lensScene.add(new THREE.Mesh(new THREE.PlaneGeometry(2, 2), lensMat));
        }

        function updateLensUniforms() {
            const u = lensMat.uniforms;
            const pr = renderer.getPixelRatio();
            u.uRes.value.set(window.innerWidth * pr, window.innerHeight * pr);

            const camPos = camera.position.clone().sub(sceneCenter).divideScalar(BH_SCALE);
            u.uCamPos.value.copy(camPos);

            const fwd = camPos.clone().negate().normalize();
            const right = new THREE.Vector3().crossVectors(fwd, new THREE.Vector3(0, 1, 0)).normalize();
            const up = new THREE.Vector3().crossVectors(right, fwd).normalize();
            u.uFwd.value.copy(fwd);
            u.uRight.value.copy(right);
            u.uUp.value.copy(up);
            u.uTime.value = time;
            u.uForm.value = Math.min(Math.max((bhTime - 0.15) / 2.2, 0), 1);
            u.uEsc.value = camPos.length() + 8.0; // ズームアウトしても全体が描かれる
        }

        function makeSpriteTexture() {
            const c = document.createElement('canvas');
            c.width = 64; c.height = 64;
            const ctx = c.getContext('2d');
            const g = ctx.createRadialGradient(32, 32, 0, 32, 32, 32);
            g.addColorStop(0.0, 'rgba(255,255,255,1)');
            g.addColorStop(0.25, 'rgba(255,255,255,0.9)');
            g.addColorStop(0.55, 'rgba(255,255,255,0.28)');
            g.addColorStop(1.0, 'rgba(255,255,255,0)');
            ctx.fillStyle = g;
            ctx.beginPath();
            ctx.arc(32, 32, 32, 0, Math.PI * 2);
            ctx.fill();
            const t = new THREE.CanvasTexture(c);
            t.needsUpdate = true;
            return t;
        }

        function createStarfield() {
            spriteTex = makeSpriteTexture();
            const starGeometry = new THREE.BufferGeometry();
            const starPositions = new Float32Array(12000 * 3);
            for (let i = 0; i < 12000 * 3; i += 3) {

                starPositions[i + 1] = (Math.random() - 0.5) * 7000;
                starPositions[i + 2] = (Math.random() - 0.5) * 7000;

            starGeometry.setAttribute('position', new THREE.BufferAttribute(starPositions, 3));

                depthWrite: false,
                blending: THREE.AdditiveBlending

        }

        function makeDiskTexture() {
            const c = document.createElement('canvas');
            c.width = 1024; c.height = 1024;
            const ctx = c.getContext('2d');
            const g = ctx.createRadialGradient(512, 512, 90, 512, 512, 512);
            g.addColorStop(0.00, 'rgba(255,255,255,0)');
            g.addColorStop(0.10, 'rgba(255,255,240,1)');
            g.addColorStop(0.22, 'rgba(255,220,120,1)');
            g.addColorStop(0.42, 'rgba(255,150,40,0.85)');
            g.addColorStop(0.68, 'rgba(220,70,10,0.45)');
            g.addColorStop(1.00, 'rgba(60,10,0,0)');
            ctx.fillStyle = g;
            ctx.fillRect(0, 0, 1024, 1024);

            // 乱流の筋（渦を巻く細い線）
            ctx.globalCompositeOperation = 'lighter';
            for (let i = 0; i < 700; i++) {
                const a0 = Math.random() * Math.PI * 2;
                const r0 = 100 + Math.random() * 400;
                const len = 0.3 + Math.random() * 1.2;
                ctx.beginPath();
                ctx.arc(512, 512, r0, a0, a0 + len);
                ctx.strokeStyle = `rgba(255,${180 + Math.random() * 75 | 0},${Math.random() * 90 | 0},${Math.random() * 0.16})`;
                ctx.lineWidth = 0.5 + Math.random() * 2.5;
                ctx.stroke();
            }
            const t = new THREE.CanvasTexture(c);
            t.needsUpdate = true;
            return t;
        }

        function createBlackHole(pos) {
            discMeshes = [];
            bhParts = [];
            bhTime = 0;
            sceneCenter.copy(pos);
            cameraDistance = Math.max(cameraDistance, 260);

            // レンズシェーダーに切り替え：3D背景星を降ろす
            bhFormed = true;
            scene.background = null;
            if (starfieldMesh) scene.remove(starfieldMesh);

            // マーカー（円盤・地平面はシェーダーが描く）
            blackHole = new THREE.Object3D();
            blackHole.position.copy(pos);
            scene.add(blackHole);

            // 影のオクルーダー：色は描かず深度だけ書き込む。
            // これで奥側のジェットや爆発の粒が影に隠れる。
            occluder = new THREE.Mesh(
                new THREE.SphereGeometry(BH_SCALE * SHADOW_K, 64, 64),
                new THREE.MeshBasicMaterial({ colorWrite: false, depthWrite: true, depthTest: true })
            );
            occluder.position.copy(pos);
            occluder.renderOrder = -100;
            occluder.scale.setScalar(0.03);
            scene.add(occluder);

            // 合体の閃光
            const flashMat = new THREE.MeshBasicMaterial({
                color: 0xffffff, transparent: true, opacity: 1,
                blending: THREE.AdditiveBlending, depthWrite: false, toneMapped: false
            });
            flash = new THREE.Mesh(new THREE.SphereGeometry(12, 32, 32), flashMat);
            flash.position.copy(pos);
            scene.add(flash);

            // 相対論的ジェット（Y軸に沿って伸びる）
            for (let dir = -1; dir <= 1; dir += 2) {
                const group = new THREE.Group();
                group.position.copy(pos);
                for (let i = 0; i < 2; i++) {
                    const jetGeo = new THREE.ConeGeometry(4 + i * 5, 220, 64, 1, true);
                    const jetMat = makeJetMaterial(i === 0 ? 0xffeecc : 0x9966ff, i === 0 ? 0.85 : 0.35);
                    jetMats.push(jetMat);
                    const jet = new THREE.Mesh(jetGeo, jetMat);
                    jet.position.y = dir * 110;
                    jet.rotation.x = dir > 0 ? Math.PI : 0;
                    group.add(jet);
                    bhParts.push({ mesh: jet, delay: 1.6, dur: 1.0, opacity: i === 0 ? 0.85 : 0.35 });
                }
                group.scale.y = 0.01;
                group.renderOrder = 10;
                scene.add(group);
                bhParts.push({ mesh: group, delay: 1.6, dur: 1.5, scaleY: 1 });
            }

            createGravWaveRings(pos);
            createInfallGas(pos);
            createExplosion(pos);
            document.getElementById('status').textContent = 'ブラックホール形成中...';
        }


        function updateBlackHoleFormation(dt) {
            if (!blackHole) return;
            bhTime += dt;

            shakeImpulse *= Math.exp(-dt * 2.6);   // 衝撃はすぐ収まる
            if (shakeImpulse < 0.001) shakeImpulse = 0;

            jetMats.forEach(m => { m.uniforms.uTime.value = time; });
            updateGravWaveRings(dt * speed * 0.5);
            updateInfallGas(dt);

            // 閃光：一瞬で膨張して消える
            if (flash) {
                const f = Math.min(bhTime / 0.9, 1);
                flash.scale.setScalar(1 + f * 14);
                flash.material.opacity = Math.pow(1 - f, 2);
                if (f >= 1) { scene.remove(flash); flash = null; }
            }

            // シェーダーの uForm と厳密に一致（horizon の成長と同期）
            if (occluder) {
                const form = Math.min(Math.max((bhTime - 0.15) / 2.2, 0), 1);
                // horizon = mix(0.03, 1.0, form) と同じ係数で膨張させる
                occluder.scale.setScalar(0.03 + form * (1.0 - 0.03));
            }

            const ease = (x) => 1 - Math.pow(1 - x, 3);

            bhParts.forEach(p => {
                const t = Math.max(0, Math.min((bhTime - p.delay) / p.dur, 1));
                if (t <= 0) return;
                const e = ease(t);
                if (p.scale !== undefined) p.mesh.scale.setScalar(0.01 + e * (p.scale - 0.01));
                if (p.scaleY !== undefined) p.mesh.scale.y = 0.01 + e * (p.scaleY - 0.01);
                if (p.opacity !== undefined) {
                    const m = p.mesh.material;
                    // fade: 立ち上がってから消える（sin山）。通常: 立ち上がって維持
                    const o = p.fade ? Math.sin(t * Math.PI) * p.opacity : e * p.opacity;
                    if (m.uniforms && m.uniforms.uOpacity) m.uniforms.uOpacity.value = o;
                    else m.opacity = o;
                }
            });

            if (bhTime > 3.2) {
                document.getElementById('status').textContent = 'ブラックホール形成完了';
            }
        }

        function createExplosion(pos) {
            // 合体直後に外へ弾ける放出。円盤面に沿って扁平にし、
            // 短時間で消えることで事象の地平面を覆い隠さないようにする
            for (let wave = 0; wave < 2; wave++) {
                const pGeo = new THREE.BufferGeometry();
                const count = 3000;
                const positions = new Float32Array(count * 3);
                const colors = new Float32Array(count * 3);

                for (let i = 0; i < count; i++) {
                    const r = 130 + wave * 40 + Math.random() * 30;
                    const theta = Math.random() * Math.PI * 2;
                    // Y方向を強く潰して円盤面に沿わせる（±0.25の薄い層）
                    const phi = Math.acos((Math.random() * 2 - 1) * 0.25);

                    positions[i * 3] = Math.sin(phi) * Math.cos(theta) * r;
                    positions[i * 3 + 1] = Math.cos(phi) * r * 0.35;
                    positions[i * 3 + 2] = Math.sin(phi) * Math.sin(theta) * r;

                    const c = Math.random();
                    if (c < 0.2)       { colors[i*3]=1; colors[i*3+1]=0.15; colors[i*3+2]=0; }
                    else if (c < 0.5)  { colors[i*3]=1; colors[i*3+1]=0.45; colors[i*3+2]=0; }
                    else if (c < 0.8)  { colors[i*3]=1; colors[i*3+1]=0.75; colors[i*3+2]=0.1; }
                    else               { colors[i*3]=1; colors[i*3+1]=0.95; colors[i*3+2]=0.4; }
                }

                pGeo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
                pGeo.setAttribute('color', new THREE.BufferAttribute(colors, 3));

                const pMat = new THREE.PointsMaterial({
                    size: 2.4,
                    vertexColors: true,
                    map: spriteTex,
                    transparent: true,
                    opacity: 0,
                    sizeAttenuation: true,
                    depthWrite: false,
                    depthTest: true,
                    blending: THREE.AdditiveBlending,
                    toneMapped: false
                });

                const particles = new THREE.Points(pGeo, pMat);
                particles.position.copy(pos);
                particles.scale.setScalar(0.1);
                particles.renderOrder = 5;
                scene.add(particles);
                // 短時間で膨張しながら消える（キロノヴァの一瞬の閃光）
                bhParts.push({ mesh: particles, delay: 0.05 + wave * 0.1, dur: 1.2, scale: 1.6, opacity: 0.45 - wave * 0.12, fade: true });
            }
        }

        function updatePhysics() {
            if (paused) return;

            time += 0.016 * speed;

            const r = Math.max(6, 110 - time * 0.8);
            // 接近するほど公転が加速（角速度 ω ∝ r^-1.5、上限つき）
            const omega = Math.min(3.0, 0.5 * Math.pow(110 / r, 1.5));
            phase += 0.016 * speed * omega;

            const x1 = Math.cos(phase) * r;
            const z1 = Math.sin(phase) * r;

            star1.position.set(x1, 0, z1);
            star2.position.set(-x1, 0, -z1);

            star1.rotation.y += 0.016 * 0.8;
            star1.rotation.x += 0.016 * 0.3;
            star2.rotation.y += 0.016 * 0.8;
            star2.rotation.x += 0.016 * 0.3;

            const dist = star1.position.distanceTo(star2.position);
            starDist = dist;
            const scale = Math.max(0.7, 1 + (110 - dist) * 0.025);
            star1.scale.set(scale, scale * 1.15, scale);
            star2.scale.set(scale, scale * 1.15, scale);

            if (star1.children[0]) star1.children[0].material.opacity = 0.2 + (110 - dist) * 0.01;
            if (star2.children[0]) star2.children[0].material.opacity = 0.2 + (110 - dist) * 0.01;

            // 降着円盤の回転
            discMeshes.forEach((disc, i) => {
                disc.rotation.z += 0.001 + i * 0.0005;
            });

            document.getElementById('time').textContent = time.toFixed(1) + 's';
            document.getElementById('dist').textContent = dist.toFixed(1);

            // 重力波放出による震え：接近するほど激しく
            if (!blackHole) {
                shakeAmp = dist < 26 ? Math.pow((26 - dist) / 26, 2.2) : 0;
            }

            if (dist < 16 && !blackHole) {
                // ブラックホールは原点に固定（レンズ円盤の中心と一致させる）
                const mergePos = new THREE.Vector3(0, 0, 0);
                createBlackHole(mergePos);
                scene.remove(star1);
                scene.remove(star2);
                shakeAmp = 0;
                shakeImpulse = 1.0;   // 合体の衝撃
                whiteout();
            } else if (!blackHole) {
                if (dist < 35) document.getElementById('status').textContent = '衝突間近!';
                else if (dist < 70) document.getElementById('status').textContent = '接近中...';
                else document.getElementById('status').textContent = '軌道中';
            }
        }

        // シミュレーションのフェーズに応じた自動カメラワーク
        function updateCinematicCamera(dt) {
            if (!autoCam) return;
            let target;
            if (!bhFormed) {
                if (starDist > 45) {
                    target = 135;                                   // ミドルショット
                } else {
                    const k = Math.min(Math.max((45 - starDist) / 29, 0), 1);
                    target = 135 - k * 68;                          // 衝突直前にグッと寄る
                }
            } else {
                // 衝撃で大きく引き、その後ゆっくり戻る
                target = bhTime < 1.0 ? 520 : 250;
            }
            const rate = bhFormed && bhTime < 1.0 ? 6.5 : 1.7;
            cameraDistance += (target - cameraDistance) * Math.min(dt * rate, 1);
            cameraDistance = Math.max(bhFormed ? 190 : 30, Math.min(900, cameraDistance));
        }

        function whiteout() {
            const el = document.getElementById('whiteout');
            el.style.transition = 'none';
            el.style.opacity = '1';
            requestAnimationFrame(() => {
                el.style.transition = 'opacity 1.8s cubic-bezier(.2,.7,.3,1)';
                el.style.opacity = '0';
            });
        }

        function goManual() {
            if (autoCam) {
                // 現在のカメラ状態を手動の初期値に
                tgtYaw = camYaw = phase * 0.15;
                tgtPitch = camPitch;
                tgtDist = cameraDistance;
                tgtPan.copy(panOffset);
            }
            autoCam = false;
            document.getElementById('autoCamLabel').textContent = 'OFF';
        }

        function updateCamera() {
            // ブラックホール形成後も必ずカメラを更新（ズームを効かせる）
            if (!blackHole && star1 && star2) {
                sceneCenter.addVectors(star1.position, star2.position).multiplyScalar(0.5);
            }

            const focus = sceneCenter.clone().add(panOffset);

            let angle, py;
            if (autoCam) {
                angle = phase * 0.15;
                py = Math.max(30, cameraDistance * 0.5);
            } else {
                // 目標値へ滑らかに追従（慣性感のある操作）
                camYaw += (tgtYaw - camYaw) * 0.12;
                camPitch += (tgtPitch - camPitch) * 0.12;
                cameraDistance += (tgtDist - cameraDistance) * 0.12;
                panOffset.lerp(tgtPan, 0.12);
                angle = camYaw;
                py = Math.sin(camPitch) * cameraDistance;
            }
            const horiz = autoCam ? cameraDistance : Math.cos(camPitch) * cameraDistance;

            camera.position.x = focus.x + Math.cos(angle) * horiz;
            camera.position.z = focus.z + Math.sin(angle) * horiz;
            camera.position.y = focus.y + py;

            // 重力波によるカメラシェイク（距離に比例させて見た目の振れ幅を一定に）
            const s = (shakeAmp * 0.012 + shakeImpulse * 0.055) * cameraDistance;
            if (s > 0.0001) {
                const t = performance.now() * 0.001;
                camera.position.x += (Math.sin(t * 37.1) + 0.6 * Math.sin(t * 71.3)) * s;
                camera.position.y += (Math.sin(t * 43.7) + 0.6 * Math.sin(t * 89.1)) * s;
                camera.position.z += (Math.sin(t * 53.3) + 0.6 * Math.sin(t * 97.7)) * s;
            }

            camera.lookAt(focus);
        }

        function animate() {
            requestAnimationFrame(animate);

            const nowMs = performance.now();
            const dt = Math.min((nowMs - lastFrameTime) / 1000, 0.05);
            lastFrameTime = nowMs;

            updatePhysics();
            if (!paused) updateInspiralRings(dt);
            if (!paused) updateBlackHoleFormation(dt);
            if (!paused) updateCinematicCamera(dt);
            updateCamera();

            frameCount++;
            const now = Date.now();
            if (now - lastTime > 1000) {
                fps = frameCount;
                document.getElementById('fps').textContent = fps;
                frameCount = 0;
                lastTime = now;
            }

            const zoomLevel = (120 / cameraDistance).toFixed(2);
            document.getElementById('zoom').textContent = zoomLevel + 'x';

            if (bhFormed) {
                // 1層目：重力レンズ（背景・降着円盤・事象の地平面）
                updateLensUniforms();
                renderer.autoClear = false;
                renderer.clear();                    // 色・深度をクリア
                renderer.render(lensScene, lensCam); // レンズ層は深度を書かない
                // 2層目：オクルーダーが先に深度を書き、奥側のジェットは影に隠れる
                renderer.render(scene, camera);
            } else {
                renderer.autoClear = true;
                renderer.render(scene, camera);
            }
        }

        function resetSim() {
            if (flash) { scene.remove(flash); flash = null; }
            if (occluder) { scene.remove(occluder); occluder = null; }
            if (blackHole) { scene.remove(blackHole); blackHole = null; }
            bhParts.forEach(p => { if (p.mesh.parent) p.mesh.parent.remove(p.mesh); });
            bhParts = [];
            discMeshes = [];
            bhTime = 0;
            bhFormed = false;
            jetMats = [];
            shakeAmp = 0;
            shakeImpulse = 0;
            gwRings.forEach(g => scene.remove(g.mesh));
            gwRings = [];
            if (infall) { scene.remove(infall); infall = null; infallData = null; }
            starDist = 999;
            autoCam = true;
            panOffset.set(0, 0, 0);
            camYaw = 0; camPitch = 0.5;
            document.getElementById('autoCamLabel').textContent = 'ON';

            // 爆発の殻など残骸を掃除
            for (let i = scene.children.length - 1; i >= 0; i--) {
                const o = scene.children[i];
                if (o.isPoints && o !== starfieldMesh) scene.remove(o);
                if (o.isGroup) scene.remove(o);
            }

            scene.background = new THREE.Color(0x000510);
            if (starfieldMesh && !starfieldMesh.parent) scene.add(starfieldMesh);

            time = 0;
            phase = 0;
            cameraDistance = 120;
            sceneCenter.set(0, 0, 0);

            if (star1) { star1.scale.set(1, 1, 1); scene.add(star1); }
            if (star2) { star2.scale.set(1, 1, 1); scene.add(star2); }
            if (!star1 || !star2) createNeutronStars();
        }

        function toggleAutoCam() {
            autoCam = !autoCam;
            document.getElementById('autoCamLabel').textContent = autoCam ? 'ON' : 'OFF';
        }

        function togglePause() {
            paused = !paused;
        }

        function setSpeed(v) {
            speed = parseFloat(v);
            document.getElementById('speedLabel').textContent = speed.toFixed(1) + 'x';
        }

        function togglePanel() {
            const panel = document.getElementById('panel');
            const btn = document.getElementById('toggleBtn');
            const nowHidden = panel.classList.toggle('hidden');
            // パネルが隠れたらボタンを出す、開いたらボタンを隠す
            btn.classList.toggle('hidden', !nowHidden);
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            if (lensMat) {
                const pr = renderer.getPixelRatio();
                lensMat.uniforms.uRes.value.set(window.innerWidth * pr, window.innerHeight * pr);
            }
        }

        window.addEventListener('load', init);
    </script>
</body>
</html>
